services:
  postgres:
    image: postgres:17-alpine
    container_name: taskflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow

    ports:
      - "5432:5432"

    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    image: postgres:17-alpine
    container_name: taskflow-postgres-test
    restart: unless-stopped

    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_password
      POSTGRES_DB: taskflow_test

    ports:
      - "5433:5432"

    volumes:
      - taskflow_postgres_test_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taskflow_postgres_data:
  taskflow_postgres_test_data: